name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "your_email@gmail.com"
          git config --global user.name "your_username"

          git clone https://huggingface.co/spaces/Keerthickk/smartvision-ai hf_space

          rsync -av --exclude='.git' ./ hf_space/

          cd hf_space
          git add .

          git diff --cached --quiet || git commit -m "Auto sync from GitHub"

          git push https://hf_user:$HF_TOKEN@huggingface.co/spaces/Keerthickk/smartvision-ai main